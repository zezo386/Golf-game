name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller
          
      - name: Build with PyInstaller
        run: |
          pyinstaller --name "GolfGame"  --onefile --windowed --noconsole src/main.py
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GolfGame-Windows
          path: dist/GolfGame.exe
          
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-mixer-2.0-0 libsdl2-image-2.0-0 libsdl2-ttf-2.0-0
          python -m pip install --upgrade pip
          pip install pygame pyinstaller
          
      - name: Build with PyInstaller
        run: |
          pyinstaller --name "GolfGame" \
                      --onefile \
                      --add-data "src/assets/my-mom-is-kinda-homeless.mp3:assets" \
                      src/main.py
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GolfGame-Linux
          path: dist/GolfGame
          
  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: GolfGame-Windows
          
      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: GolfGame-Linux
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            GolfGame.exe
            GolfGame
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
