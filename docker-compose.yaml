services:
  golf-game:
    build: .
    container_name: pygame-golf
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - SDL_AUDIODRIVER=dummy
      - LIBGL_ALWAYS_SOFTWARE=0
      - SDL_RENDER_DRIVER=software
      - XDG_RUNTIME_DIR=/tmp/runtime-appuser
      - HOME=/home/appuser
      - USER=appuser
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp:/tmp:rw
    network_mode: host
    stdin_open: true
    tty: true
    shm_size: 2g
    security_opt:
      - seccomp:unconfined
    user: "1000:1000"